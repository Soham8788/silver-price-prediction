services:
  - type: web
    name: silver-price-prediction
    runtime: python
    repo: https://github.com/Soham8788/silver-price-prediction
    branch: main
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0